<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#111126" />
<title>Word Detective Academy</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;min-height:100vh;min-height:100dvh;font-family:Inter,Arial,sans-serif;
  background:radial-gradient(circle at top left,rgba(120,90,255,.35),transparent 35%),
  radial-gradient(circle at bottom right,rgba(0,255,190,.18),transparent 35%),
  linear-gradient(135deg,#111126,#191936 55%,#0d0d18);
  color:#fff;display:flex;align-items:center;justify-content:center;padding:16px;
  overscroll-behavior:none;
}
.app{
  width:100%;max-width:460px;height:auto;min-height:640px;max-height:calc(100dvh - 32px);
  border-radius:34px;
  background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 30px 90px rgba(0,0,0,.5);overflow:hidden;
  border:1px solid rgba(255,255,255,.14);
  display:flex;flex-direction:column;
}
.header{
  padding:20px 18px 12px;background:rgba(0,0,0,.16);
  border-bottom:1px solid rgba(255,255,255,.08);
  flex:0 0 auto;
}
.logo{text-align:center;font-size:20px;font-weight:900;margin-bottom:14px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge,.lesson-progress{
  background:rgba(255,255,255,.16);padding:11px 12px;border-radius:18px;
  font-size:15px;font-weight:900;border:1px solid rgba(255,255,255,.18);text-align:center;
}
.lesson-progress{margin-top:10px}
.progress{margin-top:14px;height:11px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#00f5a0,#00d9f5);transition:.35s}
.screen{
  padding:20px 24px 28px;text-align:center;
  flex:1 1 auto;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.character{
  width:118px;height:118px;margin:10px auto 16px;border-radius:50%;
  background:linear-gradient(145deg,#ff7ad9,#ffc36b);
  display:flex;align-items:center;justify-content:center;font-size:62px;
  box-shadow:0 16px 45px rgba(255,122,217,.28);
  animation:float 2.2s ease-in-out infinite alternate;
}
@keyframes float{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.title{font-size:26px;font-weight:900;margin:12px 0 8px}
.subtitle{color:rgba(255,255,255,.74);font-size:15px;line-height:1.45}
.task-card{
  margin-top:18px;padding:22px;border-radius:28px;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.1);
}
.emoji{font-size:76px;margin-bottom:14px}
.question{font-size:19px;font-weight:800;margin-bottom:18px}
.answers{display:grid;gap:11px}
button{
  border:none;border-radius:19px;padding:15px 16px;font-size:16px;font-weight:850;
  cursor:pointer;color:white;background:linear-gradient(180deg,#383866,#29294f);
  box-shadow:0 8px 0 #18182d;transition:transform .12s, box-shadow .12s, opacity .12s;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
  font-family:inherit;
}
button:disabled{opacity:.55;cursor:not-allowed}
@media (hover:hover){
  button:hover{transform:translateY(-2px)}
}
button:active{transform:translateY(4px);box-shadow:0 4px 0 #18182d}
.primary{background:linear-gradient(180deg,#00df9a,#00a978);box-shadow:0 8px 0 #007752}
.gold{background:linear-gradient(180deg,#ffc857,#ff9f1c);box-shadow:0 8px 0 #b86d00}
.danger{background:linear-gradient(180deg,#ff5c8a,#e93161);box-shadow:0 8px 0 #9f1239}
.word-box{
  min-height:58px;background:white;color:#111;border-radius:18px;margin-bottom:16px;
  padding:14px;font-size:24px;font-weight:900;letter-spacing:5px;
}
.letters{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.letter.used{opacity:.35;pointer-events:none}
.feedback{margin-top:16px;min-height:30px;font-weight:900;font-size:16px}
.correct{color:#00f5a0}.wrong{color:#ff7a9e}
.name-input{
  width:100%;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.12);
  color:#fff;
  border-radius:18px;
  padding:14px 16px;
  font-size:16px;
  font-weight:800;
  outline:none;
}
.name-input::placeholder{color:rgba(255,255,255,.65);font-weight:800}
.name-input:focus{border-color:rgba(0,245,160,.7);box-shadow:0 0 0 4px rgba(0,245,160,.14)}
.row{display:grid;gap:10px}
.shake{animation:shake .32s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-7px)}
  50%{transform:translateX(7px)}
  75%{transform:translateX(-5px)}
}
.small-note{margin-top:12px;font-size:13px;color:rgba(255,255,255,.6)}

/* Mobile layout: avoid clipping on short screens */
@media (max-height: 820px), (max-width: 480px){
  body{align-items:stretch;justify-content:flex-start;padding:8px}
  .app{min-height:auto;max-height:calc(100dvh - 16px);border-radius:24px}
  .header{padding:14px 14px 10px}
  .logo{font-size:17px;margin-bottom:10px}
  .badge,.lesson-progress{font-size:13px;padding:9px 10px;border-radius:14px}
  .screen{padding:14px 16px 20px}
  .task-card{padding:16px;border-radius:22px;margin-top:12px}
  .title{font-size:22px;margin:8px 0 6px}
  .subtitle{font-size:14px}
  .emoji{font-size:60px;margin-bottom:10px}
  .question{font-size:17px;margin-bottom:14px}
  .character{width:92px;height:92px;font-size:48px;margin:4px auto 10px}
  .word-box{font-size:22px;letter-spacing:4px;padding:12px;min-height:52px}
  button{padding:13px 14px;font-size:15px;box-shadow:0 6px 0 #18182d}
  .primary{box-shadow:0 6px 0 #007752}
  .gold{box-shadow:0 6px 0 #b86d00}
  .danger{box-shadow:0 6px 0 #9f1239}
}
@media (max-height: 620px){
  .character{width:72px;height:72px;font-size:40px}
  .emoji{font-size:48px;margin-bottom:6px}
  .title{font-size:20px}
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="logo">🕵️ Word Detective Academy</div>
    <div class="stats">
      <div class="badge">❤️ Жизни: <span id="lives">3</span>/3</div>
      <div class="badge">⭐ Опыт: <span id="xp">0</span></div>
      <div class="badge">🎯 Уровень: <span id="level">1</span></div>
      <div class="badge">🔥 Серия: <span id="streak">0</span></div>
    </div>
    <div class="lesson-progress">
      Прогресс: <span id="stepNow">0</span>/<span id="stepTotal">15</span>
    </div>
    <div class="progress"><div class="progress-fill" id="progress"></div></div>
  </div>

  <div class="screen" id="screen"></div>
</div>

<script>
let xp = 0;
let lives = 3;
let step = 0;
let streak = 0;
let unlocked = false;
let tasks = [];
let inputLocked = false;
let childName = (localStorage.getItem("wda_child_name") || "").trim();

const MAX_LIVES = 3;
const LESSON_SIZE = 15;

const taskBank = [
  {type:"choice",emoji:"🐶",ru:"собака",correct:"dog",options:["dog","cat","fish"]},
  {type:"choice",emoji:"🐱",ru:"кот",correct:"cat",options:["cat","dog","car"]},
  {type:"choice",emoji:"🐟",ru:"рыба",correct:"fish",options:["fish","book","house"]},
  {type:"choice",emoji:"🐰",ru:"кролик",correct:"rabbit",options:["rabbit","dog","apple"]},
  {type:"choice",emoji:"🐸",ru:"лягушка",correct:"frog",options:["frog","cat","sun"]},
  {type:"choice",emoji:"🐻",ru:"медведь",correct:"bear",options:["bear","bed","star"]},

  {type:"choice",emoji:"🍎",ru:"яблоко",correct:"apple",options:["apple","book","car"]},
  {type:"choice",emoji:"🍌",ru:"банан",correct:"banana",options:["banana","apple","sun"]},
  {type:"choice",emoji:"🍓",ru:"клубника",correct:"strawberry",options:["strawberry","school","moon"]},
  {type:"choice",emoji:"🍊",ru:"апельсин",correct:"orange",options:["orange","chair","fish"]},

  {type:"choice",emoji:"🏠",ru:"дом",correct:"house",options:["house","cat","book"]},
  {type:"choice",emoji:"🏫",ru:"школа",correct:"school",options:["school","dog","apple"]},
  {type:"choice",emoji:"📚",ru:"книга",correct:"book",options:["book","house","apple"]},
  {type:"choice",emoji:"🪑",ru:"стул",correct:"chair",options:["chair","table","fish"]},
  {type:"choice",emoji:"🛏️",ru:"кровать",correct:"bed",options:["bed","book","cat"]},
  {type:"choice",emoji:"🚗",ru:"машина",correct:"car",options:["car","dog","school"]},

  {type:"choice",emoji:"☀️",ru:"солнце",correct:"sun",options:["sun","moon","star"]},
  {type:"choice",emoji:"🌙",ru:"луна",correct:"moon",options:["moon","sun","book"]},
  {type:"choice",emoji:"⭐",ru:"звезда",correct:"star",options:["star","car","fish"]},

  {type:"build",emoji:"🐶",word:"dog",ru:"собака"},
  {type:"build",emoji:"🐱",word:"cat",ru:"кот"},
  {type:"build",emoji:"🐟",word:"fish",ru:"рыба"},
  {type:"build",emoji:"🐰",word:"rabbit",ru:"кролик"},
  {type:"build",emoji:"🐸",word:"frog",ru:"лягушка"},
  {type:"build",emoji:"🐻",word:"bear",ru:"медведь"},
  {type:"build",emoji:"🍎",word:"apple",ru:"яблоко"},
  {type:"build",emoji:"🍌",word:"banana",ru:"банан"},
  {type:"build",emoji:"🍊",word:"orange",ru:"апельсин"},
  {type:"build",emoji:"🏠",word:"house",ru:"дом"},
  {type:"build",emoji:"🏫",word:"school",ru:"школа"},
  {type:"build",emoji:"📚",word:"book",ru:"книга"},
  {type:"build",emoji:"🪑",word:"chair",ru:"стул"},
  {type:"build",emoji:"🛏️",word:"bed",ru:"кровать"},
  {type:"build",emoji:"🚗",word:"car",ru:"машина"},
  {type:"build",emoji:"☀️",word:"sun",ru:"солнце"},
  {type:"build",emoji:"🌙",word:"moon",ru:"луна"},
  {type:"build",emoji:"⭐",word:"star",ru:"звезда"},

  {type:"odd",question:"Найди лишнее слово",correct:"car",options:["dog","cat","car"]},
  {type:"odd",question:"Найди лишнее слово",correct:"chair",options:["dog","cat","chair"]},
  {type:"odd",question:"Найди лишнее слово",correct:"rabbit",options:["apple","banana","rabbit"]},
  {type:"odd",question:"Найди лишнее слово",correct:"moon",options:["red","blue","moon"]},
  {type:"odd",question:"Найди лишнее слово",correct:"book",options:["apple","banana","book"]},
  {type:"odd",question:"Найди лишнее слово",correct:"sun",options:["car","bus","sun"]},
  {type:"odd",question:"Найди лишнее слово",correct:"banana",options:["red","green","banana"]},
  {type:"odd",question:"Найди лишнее слово",correct:"school",options:["dog","cat","school"]}
];

function generateLesson(){
  tasks = shuffle(taskBank).slice(0, LESSON_SIZE);
}

function speak(text){
  try{
    if(typeof speechSynthesis === "undefined" || typeof SpeechSynthesisUtterance === "undefined") return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ru-RU";
    u.rate = 1;
    speechSynthesis.speak(u);
  } catch(e){
    /* некоторые Android WebView не поддерживают TTS — просто молчим */
  }
}

function updateStats(){
  document.getElementById("xp").textContent = xp;
  document.getElementById("lives").textContent = lives;
  document.getElementById("level").textContent = Math.floor(step / 5) + 1;
  document.getElementById("streak").textContent = streak;
  document.getElementById("stepNow").textContent = Math.min(step, tasks.length);
  document.getElementById("stepTotal").textContent = tasks.length || LESSON_SIZE;

  const percent = tasks.length ? Math.min(100, Math.max(0, (step / tasks.length) * 100)) : 0;
  document.getElementById("progress").style.width = percent + "%";
}

function safeName(){
  const n = (childName || "").trim();
  return n ? n : "детектив";
}

function setChildName(value){
  childName = (value || "").trim().replace(/\s+/g, " ");
  localStorage.setItem("wda_child_name", childName);
}

function renderStart(){
  generateLesson();
  updateStats();

  document.getElementById("screen").innerHTML = `
    <div class="character">🦊</div>
    <div class="title">Word Detective Academy</div>
    <div class="subtitle">
      Учим английские слова через игру: жизни, XP, уровни, серии правильных ответов и награды.
    </div>
    <div class="task-card">
      <div class="row">
        <input
          class="name-input"
          id="nameInput"
          type="text"
          autocomplete="given-name"
          autocapitalize="words"
          inputmode="text"
          maxlength="18"
          placeholder="Как тебя зовут? (можно пропустить)"
          value="${(childName || "").replace(/"/g, "&quot;")}"
        />
        <button type="button" class="primary" id="startBtn" onclick="startGame()">Start lesson</button>
      </div>
      <div class="small-note">После проигрыша задания будут другими.</div>
    </div>
  `;

  const input = document.getElementById("nameInput");
  const startBtn = document.getElementById("startBtn");
  const sync = () => {
    setChildName(input.value || "");
  };
  input.addEventListener("input", sync);
  input.addEventListener("keydown", (e) => {
    if(e.key === "Enter") startBtn.click();
  });
  sync();
}

function startGame(){
  speak(`Начинаем урок, ${safeName()}. Помоги детективу пройти задания.`);
  renderTask();
}

function renderTask(){
  inputLocked = false;
  updateStats();

  if(lives <= 0){
    renderGameOver();
    return;
  }

  if(step === 5 && !unlocked){
    renderPaywall();
    return;
  }

  if(step >= tasks.length){
    renderWin();
    return;
  }

  const t = tasks[step];

  if(t.type === "choice") renderChoice(t);
  if(t.type === "build") renderBuild(t);
  if(t.type === "odd") renderOdd(t);
}

function baseCard(character, inner){
  document.getElementById("screen").innerHTML = `
    <div class="character">${character}</div>
    <div class="task-card" id="taskCard">
      ${inner}
      <div class="feedback" id="feedback"></div>
    </div>
  `;
}

function renderChoice(t){
  baseCard("🦊", `
    <div class="emoji">${t.emoji}</div>
    <div class="question">${safeName()}, выбери слово: <b>${t.ru}</b></div>
    <div class="answers">
      ${shuffle(t.options).map(o => `<button type="button" onclick="checkChoice('${o}','${t.correct}')">${o}</button>`).join("")}
    </div>
  `);
}

function renderOdd(t){
  baseCard("🧠", `
    <div class="question">${safeName()}, ${t.question.toLowerCase()}</div>
    <div class="subtitle">Выбери слово, которое не подходит к группе</div>
    <br>
    <div class="answers">
      ${shuffle(t.options).map(o => `<button type="button" onclick="checkChoice('${o}','${t.correct}')">${o}</button>`).join("")}
    </div>
  `);
}

function renderBuild(t){
  const letters = shuffle(t.word.split(""));
  let current = "";
  let index = 0;

  baseCard("🧩", `
    <div class="emoji">${t.emoji}</div>
    <div class="question">${safeName()}, собери слово: <b>${t.ru}</b></div>
    <div class="word-box" id="wordBox"></div>
    <div class="letters" id="letters">
      ${letters.map((l,i) => `<button type="button" class="letter" id="letter-${i}">${l}</button>`).join("")}
    </div>
  `);

  letters.forEach((letter, i) => {
    document.getElementById(`letter-${i}`).onclick = () => {
      if(inputLocked) return;
      const expected = t.word[index];

      if(letter === expected){
        current += letter;
        index++;
        document.getElementById("wordBox").textContent = current;
        document.getElementById(`letter-${i}`).classList.add("used");
        speak(letter);

        // Можно нажать только правильную букву: остальные временно блокируем.
        lockBuildLetters(t.word[index], letters);

        if(current === t.word){
          inputLocked = true;
          setTimeout(() => correctAnswer(), 400);
        }
      } else {
        inputLocked = true;
        wrongAnswer();
        setTimeout(() => {
          if(lives > 0){
            inputLocked = false;
          }
        }, 650);
      }
    };
  });

  // На старте активна только первая буква
  lockBuildLetters(t.word[0], letters);
}

function checkChoice(answer, correct){
  if(inputLocked) return;
  inputLocked = true;
  if(answer === correct){
    correctAnswer();
  } else {
    wrongAnswer();
    setTimeout(() => {
      if(lives > 0){
        inputLocked = false;
      }
    }, 650);
  }
}

function correctAnswer(){
  if(lives <= 0) return;
  xp += 10;
  streak++;
  step++;

  speak(`Правильно, ${safeName()}! Отличная работа.`);
  showFeedback("Correct! +10 XP", true);
  updateStats();

  setTimeout(renderTask, 800);
}

function wrongAnswer(){
  if(lives <= 0) return;
  lives = Math.max(0, lives - 1);
  streak = 0;

  speak(`Ошибка, ${safeName()}. Попробуй ещё раз.`);

  const card = document.getElementById("taskCard");
  if(card){
    card.classList.add("shake");
    setTimeout(() => card.classList.remove("shake"), 350);
  }

  showFeedback("Try again. Life lost.", false);
  updateStats();

  if(lives <= 0){
    setTimeout(renderGameOver, 750);
  }
}

function showFeedback(text, ok){
  const f = document.getElementById("feedback");
  if(!f) return;

  f.textContent = text;
  f.className = "feedback " + (ok ? "correct" : "wrong");
}

function renderPaywall(){
  updateStats();

  document.getElementById("screen").innerHTML = `
    <div class="character">🔒</div>
    <div class="title">Unlock Full Game</div>
    <div class="subtitle">
      Демо-уровень пройден. Открой полную игру с новыми словами, уровнями и наградами.
    </div>
    <div class="task-card">
      <button type="button" class="gold" onclick="unlockGame()">💳 Купить доступ</button>
      <br><br>
      <button type="button" onclick="unlockGame()">Продолжить в демо</button>
      <div class="small-note">Кнопка оплаты пока демо. Потом подключим настоящую оплату.</div>
    </div>
  `;
}

function unlockGame(){
  unlocked = true;
  speak("Полная версия открыта.");
  renderTask();
}

function renderGameOver(){
  updateStats();

  document.getElementById("screen").innerHTML = `
    <div class="character">💔</div>
    <div class="title">Lesson failed</div>
    <div class="subtitle">
      ${safeName()}, жизни закончились. Начни заново — уровень тот же, но задания будут другими.
    </div>
    <div class="task-card">
      <button type="button" class="danger" onclick="restart()">Restart lesson</button>
    </div>
  `;
}

function renderWin(){
  document.getElementById("progress").style.width = "100%";

  speak(`${safeName()}, урок завершён. Ты настоящий детектив английских слов!`);

  document.getElementById("screen").innerHTML = `
    <div class="character">🏆</div>
    <div class="title">Lesson Complete!</div>
    <div class="subtitle">
      ${safeName()}, ты набрал(а) ${xp} XP и прошёл(шла) уровень Word Detective Academy.
    </div>
    <div class="task-card">
      <button type="button" class="primary" onclick="restart()">Play again</button>
    </div>
  `;
}

function restart(){
  xp = 0;
  lives = MAX_LIVES;
  step = 0;
  streak = 0;
  unlocked = false;
  inputLocked = false;
  generateLesson();
  renderTask();
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function lockBuildLetters(expectedLetter, letters){
  const container = document.getElementById("letters");
  if(!container) return;
  letters.forEach((letter, i) => {
    const btn = document.getElementById(`letter-${i}`);
    if(!btn) return;
    const alreadyUsed = btn.classList.contains("used");
    const shouldEnable = !alreadyUsed && letter === expectedLetter;
    btn.disabled = !shouldEnable;
  });
}

renderStart();
</script>
</body>
</html>
